name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check backend tests --select E9,F63,F7,F82

      - name: Syntax check
        run: python -m py_compile backend/main.py backend/simulate_driver.py

      - name: Run tests
        env:
          DRIVER_API_KEYS: dev-driver-key
          APP_ENV: test
        run: pytest -q
